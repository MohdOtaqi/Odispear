# Nixpacks configuration for Railway deployment
# App is in unity-platform subdirectory

[phases.setup]
nixPkgs = ["nodejs-18_x"]

[phases.install]
cmds = [
    "cd unity-platform/frontend && npm install",
    "cd unity-platform/backend && npm install"
]

[phases.build]
cmds = [
    "cd unity-platform/frontend && npm run build",
    "cd unity-platform/backend && npm run build"
]

[start]
cmd = "cd unity-platform/backend && npm start"
