services:
  - type: web
    name: odispear
    env: node
    plan: free
    rootDir: unity-platform
    buildCommand: cd frontend && npm install --production=false && npm run build && cd ../backend && npm install --production=false && npm run build
    preDeployCommand: cd backend && npm run migrate:prod
    startCommand: cd backend && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DAILY_API_KEY
        sync: false
      - key: DAILY_DOMAIN
        sync: false
      - key: DATABASE_URL
        sync: false
