services:
  # Main web service
  - type: web
    name: odispear
    env: node
    plan: free
    buildCommand: cd unity-platform && npm run build:all
    startCommand: cd unity-platform/backend && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DAILY_API_KEY
        sync: false
      - key: DAILY_DOMAIN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: postgres
          property: connectionString
    
  # PostgreSQL database
  - type: pgsql
    name: postgres
    plan: free
    databaseName: odispear
    user: odispear

# Build settings
buildCommand: |
  cd unity-platform/frontend && npm install && npm run build &&
  cd ../backend && npm install && npm run build
