services:
  - type: web
    name: odispear
    env: node
    plan: free
    buildCommand: npm run build:all
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DAILY_API_KEY
        sync: false
      - key: DAILY_DOMAIN
        sync: false
      - key: DATABASE_URL
        sync: false
